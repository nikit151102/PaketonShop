<div class="topup-overlay" *ngIf="isOpen" (click)="closeModal()">
    <div class="topup-popup" (click)="$event.stopPropagation()">
        <div class="topup-popup__header">
            <h3>Пополнение баланса</h3>
            <button class="topup-popup__close" (click)="closeModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        
        <div class="topup-popup__body">
            <div class="current-balance">
                <span class="current-balance__label">Текущий баланс</span>
                <span class="current-balance__value">{{ formatCurrency(currentBalance) }}</span>
            </div>

            <div class="amount-presets">
                <button *ngFor="let amount of presetAmounts" 
                        class="amount-preset" 
                        [class.active]="selectedAmount === amount"
                        (click)="selectAmount(amount)">
                    {{ formatCurrency(amount) }}
                </button>
            </div>

            <div class="custom-amount">
                <label class="custom-amount__label">Другая сумма</label>
                <input type="number" 
                       class="custom-amount__input" 
                       [class.invalid]="customAmount > 0 && customAmount < minAmount"
                       [(ngModel)]="customAmount" 
                       (ngModelChange)="onCustomAmountChange()"
                       placeholder="Введите сумму">
                <div class="custom-amount__hint" *ngIf="customAmount > 0 && customAmount < minAmount">
                    Минимальная сумма: {{ formatCurrency(minAmount) }}
                </div>
            </div>

            <div class="topup-info">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span>Средства поступят на счет сразу после оплаты</span>
            </div>
        </div>

        <div class="topup-popup__footer">
            <button class="topup-cancel" (click)="closeModal()">Отмена</button>
            <button class="topup-submit" 
                    [disabled]="!isAmountValid || isProcessing"
                    (click)="processTopup()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" *ngIf="!isProcessing">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                <span *ngIf="!isProcessing">Пополнить на {{ formatCurrency(topupAmountValue) }}</span>
                <span *ngIf="isProcessing">Обработка...</span>
            </button>
        </div>
    </div>
</div>
