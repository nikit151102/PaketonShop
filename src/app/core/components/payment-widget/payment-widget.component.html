<div class="payment-widget-container" *ngIf="isWidgetVisible" [class.visible]="isWidgetVisible">
  <!-- Затемнение фона -->
  <div class="payment-widget-overlay" (click)="closeWidget()"></div>
  
  <!-- Контейнер для виджета -->
  <div class="payment-widget-content">
    <div class="payment-widget-header">
      <h3 class="payment-widget-title">Оплата заказа</h3>
      <button class="payment-widget-close" (click)="closeWidget()" aria-label="Закрыть">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
        </svg>
      </button>
    </div>
    
    <!-- Здесь будет отображаться виджет ЮMoney -->
    <div id="payment-widget"></div>
    
    <div class="payment-widget-footer" *ngIf="showLoader">
      <div class="payment-loader">
        <div class="payment-loader__spinner"></div>
        <p>Загрузка платежной формы...</p>
      </div>
    </div>
  </div>
</div>
