<div class="payment-widget" *ngIf="isWidgetVisible">
    <div class="payment-widget__overlay" (click)="closeWidget()"></div>
    <div class="payment-widget__container">
        <button class="payment-widget__close" (click)="closeWidget()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </button>
        <div class="payment-widget__content">
            <div #widgetContainer class="widget-container"></div>
            <div class="payment-widget__loader" *ngIf="showLoader">
                <div class="loader-spinner"></div>
                <p>Загрузка платежной формы...</p>
            </div>
        </div>
    </div>
</div>
