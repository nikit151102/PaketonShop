<section class="section" (scroll)="onScroll()">
  <h2>Избранные товары</h2>

  <!-- Состояние загрузки -->
  <div class="loading-state" *ngIf="loading && products.length === 0">
    <div class="spinner"></div>
    <p>Загружаем ваши избранные товары...</p>
  </div>

  <!-- Список товаров -->
  <div class="products" *ngIf="products.length > 0">
    <app-product 
      [product]="product" 
      *ngFor="let product of products"
    ></app-product>
  </div>

  <!-- Пустое состояние -->
  <app-empty-state
    *ngIf="!loading && products.length === 0"
    type="favorites"
    (buttonClick)="goToCatalog()"
  ></app-empty-state>

  <!-- Индикатор загрузки при подгрузке -->
  <div class="loading-more" *ngIf="loading && products.length > 0">
    <div class="spinner-small"></div>
    <span>Загрузка еще...</span>
  </div>
</section>
