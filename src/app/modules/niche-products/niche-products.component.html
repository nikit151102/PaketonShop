<div class="categories-page">
    <!-- Заголовок категории -->
    <div *ngIf="nicheData" class="category-header">

        <app-title [title]="nicheData.name" [description]="nicheData.description"></app-title>

        <div class="header-image" *ngIf="nicheData.imageUrl">
            <img [src]="nicheData.imageUrl" [alt]="nicheData.name">
        </div>
    </div>
    <div class="category-tags-container">
        <div class="category-tags" [class.expanded]="showAllTags">
            <a *ngFor="let category of visibleCategories; let i = index" class="category-tag"
                [routerLink]="['/category', category.id]" [style.animation-delay]="i * 0.03 + 's'">

                <span class="category-tag__name">{{ category.name }}</span>

                <span class="category-tag__count" *ngIf="category.count">
                    {{ category.count }}
                </span>

                <span class="category-tag__arrow" *ngIf="category.subCategories?.length > 0">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" />
                    </svg>
                </span>
            </a>
        </div>

        <!-- Кнопка "Показать еще" -->
        <!-- <button *ngIf="hasMoreTags" 
          class="show-more-btn" 
          (click)="toggleShowAllTags()"
          [class.expanded]="showAllTags">
    <span class="btn-text">{{ showAllTags ? 'Скрыть' : 'Показать еще' }}</span>
    <span class="btn-count" *ngIf="!showAllTags">+{{ hiddenTagsCount }}</span>
    <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"
         [class.rotated]="showAllTags">
      <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
    </svg>
  </button> -->
    </div>

    <!-- Панель переключения режимов просмотра -->
    <div class="view-mode-header">
        <div class="view-mode-tabs">
            <button class="view-mode-tab" [class.active]="viewMode === 'cards'" (click)="setViewMode('cards')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z" />
                </svg>
                <span>Карточки</span>
            </button>
            <button class="view-mode-tab" [class.active]="viewMode === 'flipbook'" (click)="setViewMode('flipbook')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z" />
                </svg>
                <span>Каталог</span>
            </button>
        </div>

    </div>

    <!-- Основной контент -->
    <div class="main-content" *ngIf="viewMode === 'cards'">
        <!-- Сайдбар с фильтрами -->
        <aside class="filters-sidebar" *ngIf="filters.length > 0">
            <app-filters [filters]="filters" [productsCount]="products.length" (filtersChange)="onFiltersChange($event)"
                (filtersApplied)="applyFilters()">
            </app-filters>
        </aside>

        <!-- Товары -->
        <main class="products-section">
            <div class="section-header">
                <div class="sort-controls">

                </div>
            </div>

            <!-- Сообщение об ошибке -->
            <div *ngIf="error && !loading" class="error-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" />
                </svg>
                <h3>Ошибка загрузки</h3>
                <p>{{ error }}</p>
                <button class="retry-btn" (click)="retry()">
                    Попробовать снова
                </button>
            </div>

            <!-- Сообщение если товаров нет -->
            <div *ngIf="products.length === 0 && !loading && !error" class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M22 9h-4.79l-4.39-6.57a1 1 0 0 0-1.66 0L6.79 9H2c-.55 0-1 .45-1 1 0 .09.01.18.04.27l2.54 9.27c.23.84 1 1.46 1.92 1.46h13c.92 0 1.69-.62 1.93-1.46l2.54-9.27L23 10c0-.55-.45-1-1-1zM12 4.8L14.8 9H9.2L12 4.8zM18.5 19l-12.99.01L3.31 11H20.7l-2.2 8zM12 13c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" />
                </svg>
                <h3>Товары не найдены</h3>
                <p>В данной категории пока нет товаров</p>
                <button class="back-btn" routerLink="/">
                    Вернуться в каталог
                </button>
            </div>

            <!-- Сетка товаров -->
            <div *ngIf="products.length > 0" class="products-grid">
                <app-product *ngFor="let product of products" [product]="product" class="product-card">
                </app-product>
            </div>

            <!-- Индикатор загрузки -->
            <div *ngIf="loading" class="loading-indicator">
                <div class="loading-spinner">
                    <div class="spinner-circle"></div>
                    <div class="spinner-circle"></div>
                    <div class="spinner-circle"></div>
                </div>
                <p>Загружаем товары...</p>
            </div>

            <!-- Кнопка загрузки еще -->
            <div *ngIf="products.length < totalItems && !loading" class="load-more">
                <button class="load-more-btn" (click)="loadMore()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                    </svg>
                    Показать еще
                </button>
            </div>

            <!-- Сообщение о конце списка -->
            <div *ngIf="products.length === totalItems && products.length > 0" class="end-of-list">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                </svg>
                <p>Вы просмотрели все товары в этой категории</p>
            </div>
        </main>
    </div>

    <!-- Flipbook режим -->
    <div class="flipbook-container" *ngIf="viewMode === 'flipbook'">
<app-flipbook [nicheData]="nicheData" [subCategories]="subCategories"></app-flipbook>
    </div>
</div>
